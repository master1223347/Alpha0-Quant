name: minn_plan_full_stack

data:
  raw_root: data/raw
  max_tickers: 300
  min_sequence_length: 40
  source_timezone: UTC
  market_timezone: America/New_York
  corporate_actions_path: null

universe:
  exchange: null
  asset_type: null
  tickers: null
  max_tickers: 300
  min_sequence_length: 40
  membership_path: null
  include_delisted: true
  static_nasdaq_membership: true

targets:
  horizon: 3
  threshold: 0.001
  volatility_window: 20
  zscore_window: 20
  volatility_label_k: 0.25
  regression_clip: 3.0
  primary_target: event_meta_label
  threshold_target: vol_direction_label
  direction_target: label
  return_target: vol_target_clipped

features:
  momentum_lookback: 3
  volatility_window: 5
  relative_volume_window: 5
  volume_window: 10
  normalize: true
  use_cross_sectional: true
  use_realized_volatility: true
  realized_vol_window: 20
  use_factor_features: true
  factor_window: 78
  use_cointegration_features: true
  cointegration_window: 78
  cointegration_min_samples: 40
  cointegration_half_life_clip: 200.0

market_context:
  enabled: true
  benchmark_tickers: [SPY, QQQ]
  sector_etf_tickers: [XLC, XLY, XLP, XLE, XLF, XLV, XLI, XLB, XLRE, XLK, XLU]
  include_full_sector_bank: false
  return_lookbacks: [1, 3, 6, 12, 24, 78]
  rv_window: 78
  rv_baseline_window: 1560
  breadth_enabled: true
  breadth_ema_windows: [3, 12]
  realized_corr_enabled: true
  corr_liquid_subset_size: 300
  corr_windows_bars: [78, 390]
  corr_shrinkage: constant_correlation
  beta_window_bars: 1560
  gap_regime_enabled: true
  gap_z_window_days: 60
  gap_hmm_states: 4
  sector_map_path: data/metadata/ticker_sector_map.parquet
  infer_sector_map_if_missing: true

calendar:
  enabled: true
  macro_calendar_path: data/raw/calendar/macro_calendar.parquet
  sec_8k_events_path: data/raw/events/sec_8k_events.parquet
  earnings_calendar_pit_path: null
  enable_pre_earnings_flags_without_pit: false
  macro_events: [fomc, fomc_press, cpi, nfp, gdp]

event_target:
  enabled: true
  primary_target: event_meta_label
  event_horizon_bars: 3
  event_k: 1.0
  event_k_grid: [0.5, 0.75, 1.0, 1.25, 1.5]
  event_vol_estimator: rolling_std
  event_vol_lookback_bars: 78
  conditional_direction: true
  min_event_rate: 0.10
  max_event_rate: 0.40

dataset:
  window_size: 16
  stride: 1
  label_horizon: 1
  split_mode: global_time
  dataset_type: panel
  panel_context_size: 16
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  batch_size: 256
  num_workers: 0

model:
  model_name: panel_transformer
  hidden_dims: [256, 128]
  dropout: 0.1
  minn_enabled: true
  multitask_output: true
  probabilistic_output: true
  include_rank_head: true
  include_regime_head: false
  include_event_heads: true
  distribution: student_t

training:
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_name: cosine
  scheduler_step_size: 4
  scheduler_gamma: 0.5
  device: auto
  seed: 42
  checkpoint_dir: models/checkpoints/minn_plan_full
  log_path: models/logs/minn_plan_full/training_log.json
  metrics_path: models/logs/minn_plan_full/metrics.json
  direction_loss_weight: 0.0
  threshold_loss_weight: 0.8
  regression_loss_weight: 0.2
  rank_loss_weight: 0.1
  regime_loss_weight: 0.0
  return_rank_weight: 0.1
  regression_loss: nll
  student_t_df: 3.0
  score_alignment_weight: 0.1
  volatility_consistency_weight: 0.1
  temporal_smoothness_weight: 0.05
  cross_sectional_reg_weight: 0.05
  calibration_aux_weight: 0.05
  event_loss_weight: 1.0
  event_direction_loss_weight: 0.75
  event_focal_gamma: 2.0
  event_sample_weight_cap: 2.0

backtest:
  long_threshold: 0.60
  short_threshold: 0.40
  confidence_threshold: 0.60
  top_percentile: null
  confidence_threshold_sweep: [0.55, 0.60, 0.65, 0.70]
  confidence_top_percent_sweep: [0.05, 0.10, 0.20]
  periods_per_year: 19656
  execution_lag_bars: 1
  split_mode: global_time
  flip_positions: false
  include_costs: true
  cost_bps_per_trade: 1.0
  slippage_bps: 0.5
  signal_source: confidence_plus_mu
  score_source: expected_utility
  selection_mode: global_abs
  enable_regime_adaptation: true
  regime_states: 3
  regime_feature_window: 32
  trending_policy: follow
  mean_reverting_policy: flip
  volatile_policy: flat

uncertainty:
  method: mc_dropout
  ensemble_members: 1
  mc_dropout_samples: 20
  calibrate_by_regime: true
  calibrate_by_liquidity_bucket: true

execution_model:
  enabled: true
  use_open_auction: true
  use_close_auction: true
  regular_max_pov: 0.05
  open_max_pov: 0.03
  close_max_pov: 0.05
  open_penalty_bars: 3
  close_penalty_bars: 3
  base_spread_bps: 6.0
  base_impact_bps: 25.0
  order_notional_fraction: 0.01
  reject_excess_pov: false

evaluation:
  walk_forward_enabled: true
  walk_forward_train_days: 252
  walk_forward_val_days: 63
  walk_forward_test_days: 21
  walk_forward_step_days: 21
  walk_forward_embargo_bars: 78
  use_temperature_scaling: true
  calibration_bins: 10
  run_selection_bias_tests: true
  reality_check_bootstrap: 500
  spa_bootstrap: 500
  fdr_alpha: 0.10
  candidate_metric_keys: [metrics.auc, backtest.sharpe, backtest.pnl]

walk_forward_retrain:
  enabled: true
  train_days: 252
  val_days: 21
  test_days: 21
  step_days: 21
  embargo_bars: 78
  max_folds: null
  save_fold_models: false

deployment:
  export_format: torch_export
  export_path: models/exports/minn_plan_full.pt2
  allow_deprecated_torchscript: false
