name: panel_direction_baseline_v1

data:
  raw_root: data/raw
  max_tickers: 200
  min_sequence_length: 12

universe:
  exchange: null
  asset_type: null
  tickers: null
  max_tickers: 200
  min_sequence_length: 12

targets:
  horizon: 1
  threshold: 0.001
  volatility_window: 20
  zscore_window: 20
  primary_target: label
  direction_target: label
  threshold_target: threshold_label
  return_target: next_log_return

features:
  momentum_lookback: 3
  volatility_window: 5
  relative_volume_window: 5
  volume_window: 10
  normalize: true
  use_cross_sectional: true

dataset:
  window_size: 8
  stride: 1
  label_horizon: 1
  split_mode: global_time
  dataset_type: panel
  panel_context_size: 8
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  batch_size: 256
  num_workers: 0

model:
  model_name: panel_transformer
  hidden_dims: [256, 128]
  dropout: 0.1
  minn_enabled: false
  multitask_output: false
  probabilistic_output: false
  include_rank_head: false
  include_regime_head: false
  distribution: gaussian

training:
  epochs: 6
  learning_rate: 0.0007
  weight_decay: 0.0001
  scheduler_name: cosine
  scheduler_step_size: 3
  scheduler_gamma: 0.5
  device: auto
  seed: 42
  checkpoint_dir: models/checkpoints/panel_direction_baseline_v1
  log_path: models/logs/panel_direction_baseline_v1/training_log.json
  metrics_path: models/logs/panel_direction_baseline_v1/metrics.json
  direction_loss_weight: 1.0
  threshold_loss_weight: 0.0
  regression_loss_weight: 0.0
  rank_loss_weight: 0.0
  regime_loss_weight: 0.0
  regression_loss: huber

backtest:
  long_threshold: 0.52
  short_threshold: 0.48
  confidence_threshold: null
  top_percentile: 0.30
  confidence_threshold_sweep: [0.50, 0.55, 0.60]
  confidence_top_percent_sweep: [0.10, 0.20, 0.30]
  periods_per_year: 19656
  execution_lag_bars: 1
  split_mode: global_time
  flip_positions: false
  include_costs: true
  cost_bps_per_trade: 1.0
  slippage_bps: 0.5
  signal_source: classification_prob
  require_directional_agreement: false
  signal_mu_sigma_floor: 0.10
