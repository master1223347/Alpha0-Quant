name: cnn_like_mlp

data:
  raw_root: data/raw
  max_tickers: 200
  min_sequence_length: 19

features:
  normalize: true

dataset:
  window_size: 8
  stride: 1
  batch_size: 256

model:
  model_name: baseline_mlp
  hidden_dims: [384, 256, 128]
  dropout: 0.2

training:
  epochs: 10
  learning_rate: 0.0008
  scheduler_name: cosine
  device: auto

backtest:
  long_threshold: 0.56
  short_threshold: 0.44
