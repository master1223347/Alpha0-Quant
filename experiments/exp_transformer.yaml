name: encoder_track

data:
  raw_root: data/raw
  max_tickers: 200
  min_sequence_length: 19

features:
  normalize: true

dataset:
  window_size: 8
  stride: 1
  batch_size: 192

model:
  model_name: encoder_mlp
  hidden_dims: [512, 256]
  dropout: 0.15

training:
  epochs: 10
  learning_rate: 0.0007
  scheduler_name: cosine
  device: auto

backtest:
  long_threshold: 0.57
  short_threshold: 0.43
