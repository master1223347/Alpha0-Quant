name: vol_confidence_panel_transformer_regime

data:
  raw_root: data/raw
  max_tickers: 100
  min_sequence_length: 12

universe:
  exchange: null
  asset_type: null
  tickers: null
  max_tickers: 100
  min_sequence_length: 12

targets:
  horizon: 1
  threshold: 0.001
  volatility_window: 20
  zscore_window: 20
  volatility_label_k: 0.25
  regression_clip: 3.0
  primary_target: vol_direction_label
  threshold_target: vol_direction_label
  direction_target: label
  return_target: vol_target_clipped

features:
  momentum_lookback: 3
  volatility_window: 5
  relative_volume_window: 5
  volume_window: 10
  normalize: true
  use_cross_sectional: true

dataset:
  window_size: 8
  stride: 1
  label_horizon: 1
  split_mode: global_time
  dataset_type: panel
  panel_context_size: 8
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  batch_size: 256
  num_workers: 0

model:
  model_name: panel_transformer
  hidden_dims: [256, 128]
  dropout: 0.1

training:
  epochs: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_name: cosine
  scheduler_step_size: 4
  scheduler_gamma: 0.5
  device: auto
  seed: 42
  checkpoint_dir: models/checkpoints/vol_confidence_regime
  log_path: models/logs/vol_confidence_regime/training_log.json
  metrics_path: models/logs/vol_confidence_regime/metrics.json
  direction_loss_weight: 0.0
  threshold_loss_weight: 0.8
  regression_loss_weight: 0.2
  rank_loss_weight: 0.0
  regime_loss_weight: 0.0
  regression_loss: huber
  regression_huber_delta: 1.0

backtest:
  long_threshold: 0.60
  short_threshold: 0.60
  confidence_threshold: 0.60
  top_percentile: null
  confidence_threshold_sweep: [0.55, 0.60, 0.65, 0.70]
  confidence_top_percent_sweep: [0.05, 0.10, 0.20]
  periods_per_year: 19656
  execution_lag_bars: 1
  split_mode: global_time
  flip_positions: false
  include_costs: true
  cost_bps_per_trade: 1.0
  slippage_bps: 0.5
  enable_regime_adaptation: true
  regime_states: 3
  regime_feature_window: 32
  regime_random_state: 7
  trending_policy: follow
  mean_reverting_policy: flip
  volatile_policy: flat
  volatile_confidence_threshold: 0.75
