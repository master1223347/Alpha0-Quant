name: minn_panel_simplified_v1

data:
  raw_root: data/raw
  max_tickers: 200
  min_sequence_length: 12

universe:
  exchange: null
  asset_type: null
  tickers: null
  max_tickers: 200
  min_sequence_length: 12

targets:
  horizon: 1
  threshold: 0.001
  volatility_window: 20
  zscore_window: 20
  volatility_label_k: 0.25
  regression_clip: 3.0
  primary_target: vol_direction_label
  direction_target: label
  threshold_target: vol_direction_label
  return_target: vol_target_clipped

features:
  momentum_lookback: 3
  volatility_window: 5
  relative_volume_window: 5
  volume_window: 10
  normalize: true
  use_cross_sectional: true

dataset:
  window_size: 8
  stride: 1
  label_horizon: 1
  split_mode: global_time
  dataset_type: panel
  panel_context_size: 8
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  batch_size: 256
  num_workers: 0

model:
  model_name: panel_transformer
  hidden_dims: [256, 128]
  dropout: 0.1
  minn_enabled: true
  multitask_output: true
  probabilistic_output: false
  include_rank_head: false
  include_regime_head: false
  distribution: gaussian

training:
  epochs: 6
  learning_rate: 0.0007
  weight_decay: 0.0001
  scheduler_name: cosine
  scheduler_step_size: 3
  scheduler_gamma: 0.5
  device: auto
  seed: 42
  checkpoint_dir: models/checkpoints/minn_panel_simplified
  log_path: models/logs/minn_panel_simplified/training_log.json
  metrics_path: models/logs/minn_panel_simplified/metrics.json
  direction_loss_weight: 0.6
  threshold_loss_weight: 0.4
  regression_loss_weight: 0.0
  rank_loss_weight: 0.0
  return_rank_weight: 0.0
  regime_loss_weight: 0.0
  regression_loss: huber
  student_t_df: 3.0
  regression_huber_delta: 1.0
  score_alignment_weight: 0.0
  score_alignment_floor: 0.10
  volatility_consistency_weight: 0.0
  temporal_smoothness_weight: 0.0
  cross_sectional_reg_weight: 0.0
  calibration_aux_weight: 0.0

backtest:
  long_threshold: 0.53
  short_threshold: 0.47
  confidence_threshold: null
  top_percentile: 0.20
  selection_mode: global_abs
  score_source: expected_utility
  long_short_percentile: null
  confidence_threshold_sweep: [0.45, 0.50, 0.55]
  confidence_top_percent_sweep: [0.05, 0.10, 0.20]
  periods_per_year: 19656
  execution_lag_bars: 1
  split_mode: global_time
  flip_positions: false
  include_costs: true
  cost_bps_per_trade: 1.0
  slippage_bps: 0.5
  signal_source: classification_prob
  require_directional_agreement: false
  confidence_mu_agreement_weight: 0.50
  signal_mu_sigma_floor: 0.10
