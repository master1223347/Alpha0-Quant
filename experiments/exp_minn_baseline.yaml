name: minn_baseline_probabilistic

data:
  raw_root: data/raw
  max_tickers: 80
  min_sequence_length: 24

targets:
  horizon: 1
  primary_target: vol_direction_label
  return_target: vol_target_clipped
  threshold_target: vol_direction_label

dataset:
  window_size: 16
  stride: 1
  split_mode: global_time
  dataset_type: window
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  batch_size: 256
  num_workers: 0

model:
  model_name: baseline_mlp
  hidden_dims: [256, 128]
  dropout: 0.1
  minn_enabled: true
  multitask_output: true
  probabilistic_output: true
  distribution: gaussian

training:
  epochs: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_name: cosine
  checkpoint_dir: models/checkpoints/minn_baseline
  log_path: models/logs/minn_baseline/training_log.json
  metrics_path: models/logs/minn_baseline/metrics.json
  direction_loss_weight: 0.25
  threshold_loss_weight: 0.55
  regression_loss_weight: 0.20
  regression_loss: nll
  volatility_consistency_weight: 0.02
  temporal_smoothness_weight: 0.01
  calibration_aux_weight: 0.01

backtest:
  confidence_threshold: 0.60
  include_costs: true
  cost_bps_per_trade: 1.0
  slippage_bps: 0.5
  signal_source: confidence_plus_mu
  require_directional_agreement: true
