name: minn_tcn

data:
  raw_root: data/raw
  max_tickers: 40
  min_sequence_length: 19

universe:
  exchange: null
  asset_type: null
  tickers: null
  max_tickers: 40
  min_sequence_length: 19

targets:
  horizon: 1
  threshold: 0.001
  volatility_window: 20
  zscore_window: 20
  primary_target: label

features:
  momentum_lookback: 3
  volatility_window: 5
  relative_volume_window: 5
  volume_window: 10
  normalize: true

dataset:
  window_size: 8
  stride: 1
  label_horizon: 1
  split_mode: per_ticker
  dataset_type: window
  panel_context_size: null
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  batch_size: 256
  num_workers: 0

model:
  model_name: tcn_encoder
  hidden_dims: [256, 128]
  dropout: 0.1

training:
  epochs: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_name: cosine
  scheduler_step_size: 4
  scheduler_gamma: 0.5
  device: auto
  seed: 42
  checkpoint_dir: models/checkpoints
  log_path: models/logs/training_log.json
  metrics_path: models/logs/metrics.json

backtest:
  long_threshold: 0.55
  short_threshold: 0.45
  periods_per_year: 19656
  split_mode: per_ticker
  include_costs: true
  cost_bps_per_trade: 1.0
  slippage_bps: 0.5
