name: feature_ablation

data:
  raw_root: data/raw
  max_tickers: 150
  min_sequence_length: 19

features:
  momentum_lookback: 2
  volatility_window: 4
  relative_volume_window: 4
  volume_window: 6
  normalize: false

dataset:
  window_size: 8
  stride: 1
  batch_size: 256

model:
  model_name: baseline_mlp
  hidden_dims: [128, 64]
  dropout: 0.05

training:
  epochs: 6
  learning_rate: 0.001
  scheduler_name: step
  scheduler_step_size: 3
  scheduler_gamma: 0.5
  device: auto

backtest:
  long_threshold: 0.55
  short_threshold: 0.45
